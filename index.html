    /* ルーレットのアニメーション用スタイル */
    @keyframes slot-spin {
      0% { transform: translateY(-10px); opacity: 0.5; }
      50% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(10px); opacity: 0.5; }
    }
    .spinning {
      animation: slot-spin 0.1s linear infinite;
    }
    
    /* 画像のフワッと表示アニメーション */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
  </style>

      { no: "902", name: "イダイトウ♂" }, { no: "902", name: "イダイトウ♀" },
      { no: "903", name: "オオニューラ" }, { no: "908", name: "マスカーニャ" },
      { no: "911", name: "ラウドボーン" }, { no: "914", name: "ウェーニバル" },
      { no: "925", name: "イッカネズミ" }, { no: "934", name: "キョジオーン" },
      { no: "936", name: "グレンアルマ" }, { no: "937", name: "ソウブレイズ" },
      { no: "939", name: "ハラバリー" }, { no: "952", name: "スコヴィラン" }, { no: "952", name: "メガスコヴィラン" },
      { no: "956", name: "クエスパトラ" }, { no: "959", name: "デカヌチャン" },

      { no: "968", name: "ミミズズ" }, { no: "970", name: "キラフロル" }, { no: "970", name: "メガキラフロル" },

      { no: "1013", name: "ヤバソチャ" }, { no: "1018", name: "ブリジュラス" }, { no: "1019", name: "カミツオロチ" }
    ];

    // === 設定・定数 ===
    const CONFIG = {
      SPIN_INTERVAL_MS: 50, // ルーレットの回転速度（ミリ秒）
      MESSAGE_DISPLAY_MS: 3000, // メッセージの表示時間（ミリ秒）
      MEGA_EXCEPTIONS: ["メガニウム", "メガヤンマ"], // 「メガ」から始まるが除外しないポケモン
      EXCLUDE_FORMS: ["イルカマン(マイティ)", "ギルガルド(ブレード)"], // 戦闘中のみフォルムが変わるため除外するポケモン
      RENAME_FORMS: {
        "イルカマン(ナイーブ)": "イルカマン",
        "ギルガルド(シールド)": "ギルガルド"
      }, // 通常の姿の表示名をシンプルにするための置き換えリスト
      FORM_IMAGE_MAP: {
        "ライチュウ(アローラ)": "10100",
        "キュウコン(アローラ)": "10104",
        "ウインディ(ヒスイ)": "10230",
        "ヤドラン(ガラル)": "10167",
        "ケンタロス(パルデア単)": "10250",
        "ケンタロス(パルデア炎)": "10251",

        "バクフーン(ヒスイ)": "10233",

        "ダイケンキ(ヒスイ)": "10236",

      }, // フォルム違いのポケモンに対応するPokeAPIの画像ID
      MEGA_IMAGE_MAP: {

        "メガハガネール": "10072",
        "メガハッサム": "10046",
        "メガヘラクロス": "10047",
        "メガヘルガー": "10048",
        "メガバンギラス": "10049",
        "メガサーナイト": "10051",
        "メガヤミラミ": "10066",
        "メガボスゴドラ": "10053",
        "メガチャーレム": "10054",
        "メガライボルト": "10055",
        "メガサメハダー": "10070",
        "メガバクーダ": "10086",
        "メガチルタリス": "10067",
        "メガジュペッタ": "10056",
        "メガアブソル": "10057",
        "メガオニゴーリ": "10074",
        "メガミミロップ": "10087",
        "メガガブリアス": "10058",
        "メガルカリオ": "10059",
        "メガユキノオー": "10060",
        "メガエルレイド": "10068",
        "メガタブンネ": "10069"
      } // 公式メガシンカポケモンに対応する正確なPokeAPIの画像ID
    };

    // === 状態管理 ===
    const state = {
      rawPokemonList: [], // メガシンカ等も全て含むパース直後のリスト
      pokemonList: [],    // ルーレットの抽選対象リスト（メガ除外等）
      isSpinning: false,
      spinIntervalId: null
    };

    // === DOM要素の取得 ===
    const DOM = {
      resultNo: document.getElementById('resultNo'),
      resultName: document.getElementById('resultName'),
      imageWrapper: document.getElementById('imageWrapper'),
      actionBtn: document.getElementById('actionBtn'),
      pokemonInput: document.getElementById('pokemonInput'),
      pokemonCount: document.getElementById('pokemonCount'),
      pokemonTags: document.getElementById('pokemonTags'),
      updateListBtn: document.getElementById('updateListBtn'),
      updateMessage: document.getElementById('updateMessage'),
      theoryLinkWrapper: document.getElementById('theoryLinkWrapper'),
      theoryLink: document.getElementById('theoryLink'),
      resetBtn: document.getElementById('resetBtn'),
      clearBtn: document.getElementById('clearBtn')
    };

    // === データ処理ロジック ===

    /**
     * テキストエリアの文字列を解析し、図鑑番号と名前のオブジェクト配列に変換する
     */
    function parseInputText(text) {
      const lines = text.split('\n').map(line => line.trim()).filter(line => line !== '');
      const rawList = [];
      let currentNo = "???";

      for (const line of lines) {
        if (/^(?:No\.?\s*)?(\d+):?$/i.test(line)) {
          currentNo = line.replace(/^(?:No\.?\s*)?/i, '').replace(':', ''); 
        } else if (/^(?:No\.?\s*)?(\d+)[：:\s　]+(.+)$/i.test(line)) {
          const match = line.match(/^(?:No\.?\s*)?(\d+)[：:\s　]+(.+)$/i);
          currentNo = match[1];
          rawList.push({ no: currentNo, name: match[2].trim() });
        } else {
          rawList.push({ no: currentNo, name: line });
        }
      }
      return rawList;
    }

    /**
     * リストからメガシンカ等を除外し、ルーレット用のリストを生成する
     */
    function filterPokemonList(rawList) {
      const filtered = [];
      for (const p of rawList) {
        if (p.name.startsWith("メガ") && !CONFIG.MEGA_EXCEPTIONS.includes(p.name)) continue;
        if (CONFIG.EXCLUDE_FORMS.includes(p.name)) continue;

        const displayName = CONFIG.RENAME_FORMS[p.name] || p.name;
        filtered.push({ no: p.no, name: displayName });
      }
      return filtered;
    }

    // === UI操作ロジック ===

    /**
     * 画像表示用のHTML要素（文字列）を生成するヘルパー関数
     */
    function createPokemonImageHTML(name, imgUrl, isOfficial) {
      let imgElement = '';
      
      if (isOfficial && imgUrl) {
        imgElement = `<img src="${imgUrl}" alt="${name}" class="w-24 h-24 sm:w-32 sm:h-32 object-contain drop-shadow-xl animate-fade-in">`;
      } else {
        // 非公式メガシンカ等、画像が存在しない場合の代替アイコン
        imgElement = `
          <div class="w-20 h-20 sm:w-28 sm:h-28 bg-slate-200 rounded-full flex flex-col items-center justify-center text-slate-400 drop-shadow-md animate-fade-in border-4 border-slate-100 mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="text-[9px] font-bold">NO IMAGE</span>
          </div>
        `;
      }

      return `
        <div class="flex flex-col items-center w-24 sm:w-32">
          ${imgElement}
          <span class="text-xs sm:text-sm text-slate-500 font-bold mt-2 text-center break-words leading-tight animate-fade-in">${name}</span>
        </div>
      `;
    }

    /**
     * ルーレットの結果表示領域を更新する
     */
    function updateResultDisplay(pokemon, isSpinning) {
      DOM.resultNo.textContent = `No.${pokemon.no}`;
      DOM.resultName.textContent = pokemon.name;

      if (isSpinning) {
        DOM.resultName.classList.add('spinning');
        DOM.resultName.classList.remove('text-blue-600', 'scale-110', 'transition-transform', 'duration-300');
        DOM.resultNo.classList.remove('text-blue-500');
        
        // リンクを隠す（invisibleに変更してスペースを維持）
        DOM.theoryLinkWrapper.classList.add('invisible');
        DOM.theoryLinkWrapper.classList.remove('opacity-100');

        // 画像領域を「？」のみにする
        DOM.imageWrapper.innerHTML = `
          <div class="flex items-center justify-center w-24 h-24 sm:w-28 sm:h-28 bg-slate-200 rounded-full text-4xl text-slate-400 font-bold shadow-inner">
            ?
          </div>
        `;

      } else {
        DOM.resultName.classList.remove('spinning');
        DOM.resultName.classList.add('text-blue-600', 'scale-110', 'transition-transform', 'duration-300');
        DOM.resultNo.classList.add('text-blue-500');
        
        // --- 育成論リンクの処理 ---
        const noNumber = parseInt(pokemon.no, 10);
        DOM.theoryLink.href = `https://yakkun.com/sv/theory/p${noNumber}`;
        
        // リンクを表示する
        DOM.theoryLinkWrapper.classList.remove('invisible');
        setTimeout(() => {
          DOM.theoryLinkWrapper.classList.add('opacity-100');
        }, 50);

        // --- 画像の表示処理 (メガシンカ並列展開) ---
        DOM.imageWrapper.innerHTML = '';
        
        // 1. 通常のポケモン画像HTMLを生成
        const normalImageId = CONFIG.FORM_IMAGE_MAP[pokemon.name] || noNumber;
        const normalImgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${normalImageId}.png`;
        let html = createPokemonImageHTML(pokemon.name, normalImgUrl, true);

        // 2. 元のリストから関連するメガシンカを探す
        const relatedMegas = state.rawPokemonList.filter(p => {
          return p.no === pokemon.no && p.name.startsWith("メガ") && !CONFIG.MEGA_EXCEPTIONS.includes(p.name);
        });

        // 重複を除去してメガシンカ画像HTMLを追加
        const uniqueMegas = Array.from(new Set(relatedMegas.map(m => m.name))).map(name => relatedMegas.find(m => m.name === name));
        
        uniqueMegas.forEach(mega => {
          const megaImageId = CONFIG.MEGA_IMAGE_MAP[mega.name];
          if (megaImageId) {
            // 公式に存在するメガシンカ画像
            const megaImgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${megaImageId}.png`;
            html += createPokemonImageHTML(mega.name, megaImgUrl, true);
          } else {
            // 非公式のメガシンカ（オリジナル）等で画像がない場合
            html += createPokemonImageHTML(mega.name, null, false);
          }
        });

        DOM.imageWrapper.innerHTML = html;
      }
    }

    /**
     * スタート/ストップボタンの表示・非表示を切り替える
     */
    function toggleButtons(isSpinning) {
      if (isSpinning) {
        DOM.actionBtn.textContent = 'ストップ！';
        DOM.actionBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
        DOM.actionBtn.classList.add('bg-red-500', 'hover:bg-red-600');
      } else {
        DOM.actionBtn.textContent = 'スタート！';
        DOM.actionBtn.classList.remove('bg-red-500', 'hover:bg-red-600');
        DOM.actionBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
      }
    }

    /**
     * テキストエリアと登録件数、タグの表示を更新する
     */
    function updateListUI() {
      DOM.pokemonCount.textContent = state.pokemonList.length;
      
      DOM.pokemonInput.value = state.rawPokemonList.map(p => `${p.no} ${p.name}`).join('\n');
      
      DOM.pokemonTags.innerHTML = '';
      if (state.pokemonList.length === 0) {
        DOM.pokemonTags.innerHTML = '<span class="text-sm text-slate-400 py-2">ポケモンが登録されていません</span>';
      } else {
        const fragment = document.createDocumentFragment();
        state.pokemonList.forEach((p, index) => {
          const tag = document.createElement('span');
          tag.className = 'inline-flex items-center gap-1 pl-2.5 pr-1.5 py-1 bg-white border border-slate-200 rounded-full text-xs font-medium text-slate-700 shadow-sm transition-colors hover:border-slate-300';
          
          tag.innerHTML = `
            <span class="text-slate-400 font-normal">No.${p.no}</span>
            ${p.name}
            <button data-index="${index}" class="ml-1 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full p-0.5 transition-colors focus:outline-none" title="削除">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
              </svg>
            </button>
          `;
          fragment.appendChild(tag);
        });
        DOM.pokemonTags.appendChild(fragment);
      }
    }

    /**
     * リスト更新成功メッセージを一時的に表示する
     */
    function showUpdateSuccessMessage() {
      DOM.updateMessage.classList.remove('opacity-0');
      DOM.updateMessage.classList.add('opacity-100');
      setTimeout(() => {
        DOM.updateMessage.classList.remove('opacity-100');
        DOM.updateMessage.classList.add('opacity-0');
      }, CONFIG.MESSAGE_DISPLAY_MS);
    }

    /**
     * 現在のリストからランダムに1匹ポケモンを取得する
     */
     function getRandomPokemon() {
      const randomIndex = Math.floor(Math.random() * state.pokemonList.length);
      return state.pokemonList[randomIndex];
    }

    // === イベントハンドラ ===

    // スタート/ストップの振り分け処理
    function handleAction() {
      if (state.isSpinning) {
        handleStop();
      } else {
        handleStart();
      }
    }

    function handleUpdateList() {
      const rawList = parseInputText(DOM.pokemonInput.value);
      
      if (rawList.length === 0) {
        alert('ポケモンのデータが読み込めませんでした。入力内容を確認してください。');
        return;
      }

      state.rawPokemonList = rawList;
      state.pokemonList = filterPokemonList(rawList);
      updateListUI();
      showUpdateSuccessMessage();
    }

    function handleResetList() {
      if (confirm('リストを最初の状態（デフォルト）に戻しますか？')) {
        state.rawPokemonList = [...defaultPokemon];
        state.pokemonList = filterPokemonList(defaultPokemon);
        updateListUI();
      }
    }

    function handleClearList() {
      if (confirm('リストのポケモンをすべて削除しますか？')) {
        state.rawPokemonList = [];
        state.pokemonList = [];
        updateListUI();
      }
    }

    function handleRemoveTag(e) {
      const btn = e.target.closest('button[data-index]');
      if (btn) {
        const index = parseInt(btn.dataset.index, 10);
        // rawPokemonListから対象の番号のポケモンをすべて削除するとメガも消えてしまうので、対象の通常種だけを消す
        const removedPokemon = state.pokemonList[index];
        state.pokemonList.splice(index, 1);
        
        // rawPokemonList側からも同期して削除 (図鑑番号が一致するものをごっそり消す)
        state.rawPokemonList = state.rawPokemonList.filter(p => p.no !== removedPokemon.no);
        
        updateListUI();
      }
    }

    function handleStart() {
      if (state.pokemonList.length === 0) {
        alert('リストにポケモンがいません！設定から追加してください。');
        return;
      }

      state.isSpinning = true;
      toggleButtons(true);

      state.spinIntervalId = setInterval(() => {
        updateResultDisplay(getRandomPokemon(), true);
      }, CONFIG.SPIN_INTERVAL_MS);
    }

    function handleStop() {
      if (!state.isSpinning) return;
      
      state.isSpinning = false;
      clearInterval(state.spinIntervalId);
      
      updateResultDisplay(getRandomPokemon(), false);
      toggleButtons(false);
    }

    // === アプリケーション初期化 ===

    function init() {
      state.rawPokemonList = [...defaultPokemon];
      state.pokemonList = filterPokemonList(defaultPokemon);
      updateListUI();

      DOM.updateListBtn.addEventListener('click', handleUpdateList);
      DOM.actionBtn.addEventListener('click', handleAction);
      DOM.resetBtn.addEventListener('click', handleResetList);
      DOM.clearBtn.addEventListener('click', handleClearList);
      DOM.pokemonTags.addEventListener('click', handleRemoveTag);
    }

    init();

  </script>
